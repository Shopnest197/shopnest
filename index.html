<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopNest</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>ShopNest</h1>
    <p>Handmade Crochet Creations</p>
  </header>

  <section class="featured">
    <h2>Featured Products</h2>

    <div class="products">

      <div class="card">
        <h3>Daisy Crochet Flower</h3>
        <p>Handmade crochet flower</p>
        <h4>₹199</h4>
        <button>Add to Cart</button>
      </div>

      <div class="card">
        <h3>Bear Crochet Coaster</h3>
        <p>Soft handmade coaster</p>
        <h4>₹149</h4>
        <button>Add to Cart</button>
      </div>

      <div class="card">
        <h3>Moon Crochet Keychain</h3>
        <p>Cute handmade keychain</p>
        <h4>₹99</h4>
        <button>Add to Cart</button>
      </div>

      <div class="card">
        <h3>Star Crochet Keychain</h3>
        <p>Handmade star accessory</p>
        <h4>₹99</h4>
        <button>Add to Cart</button>
      </div>

    </div>
  </section>

</body>
</html>
